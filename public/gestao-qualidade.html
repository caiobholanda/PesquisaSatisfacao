<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestão da Qualidade — Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
[data-theme="light"]{
  --bg:#ECE4D2;--surface:#FAF9F5;--surface2:#ECE4D2;
  --header-bg:rgba(236,228,210,0.88);
  --grad1:rgba(156,88,67,.06);--grad2:rgba(156,88,67,.03);
  --border:rgba(122,107,90,.22);--border-soft:rgba(122,107,90,.10);
  --text:#202C28;--muted:#7A6B5A;--muted2:#996442;
  --gold:#9C5843;--gold-dark:#7E4636;--gold-dim:rgba(156,88,67,.12);--gold-dim2:rgba(156,88,67,.06);
  --success:#15705A;--success-dim:rgba(21,112,90,.12);
  --warn:#996442;--warn-dim:rgba(153,100,66,.12);
  --danger:#B85450;--danger-dim:rgba(184,84,80,.10);
}
[data-theme="dark"]{
  --bg:#202C28;--surface:#FAF9F5;--surface2:#2A3833;
  --header-bg:rgba(32,44,40,0.88);
  --grad1:rgba(156,88,67,.10);--grad2:rgba(156,88,67,.05);
  --border:rgba(236,228,210,.22);--border-soft:rgba(236,228,210,.10);
  --text:#ECE4D2;--muted:#8A7B6A;--muted2:#C8B89A;
  --gold:#9C5843;--gold-dark:#B26A54;--gold-dim:rgba(156,88,67,.18);--gold-dim2:rgba(156,88,67,.08);
  --success:#25D366;--success-dim:rgba(37,211,102,.16);
  --warn:#996442;--warn-dim:rgba(153,100,66,.18);
  --danger:#D86862;--danger-dim:rgba(216,104,98,.18);
}
html,body{height:100%;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1100px 560px at 12% -4%,var(--grad1),transparent 62%),radial-gradient(900px 520px at 88% 14%,var(--grad2),transparent 60%),var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hdr-brand{position:relative;padding-bottom:6px}
.hdr-brand::after{content:'';position:absolute;left:0;bottom:0;width:40px;height:2px;background:var(--gold)}
.hdr-brand span{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.06rem;color:var(--text)}
.hdr-brand em{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-weight:300;font-size:.92rem;color:var(--muted2)}
.hdr-nav{display:flex;gap:26px;margin-left:36px}
.hdr-nav a{font-size:.82rem;color:var(--muted2);text-decoration:none;transition:color .2s}
.hdr-nav a:hover{color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:18px}
.hdr-ts{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted)}
.btn-theme{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--muted2);font-size:.82rem;transition:all .2s}
.btn-theme:hover{border-color:var(--gold);color:var(--gold)}
.btn-sair{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.78rem;font-weight:500;color:var(--muted2);background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;transition:all .2s}
.btn-sair:hover{border-color:var(--gold);color:var(--gold-dark)}

/* TABS */
.tabs{display:flex;gap:30px;padding:0 40px;border-bottom:1px solid var(--border-soft);background:var(--header-bg)}
.tab{padding:15px 2px 13px;font-size:.86rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{font-weight:600;color:var(--gold-dark);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--muted2)}

/* MAIN */
.main{max-width:1220px;margin:0 auto;padding:44px 40px 80px}

/* EYEBROW */
.eyebrow{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr 1.2fr;gap:16px;margin-bottom:72px}
.kpi{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;transition:box-shadow .2s}
.kpi.hero{border-radius:14px;border-color:var(--border);padding:26px 28px 22px;box-shadow:0 4px 18px var(--gold-dim)}
.kpi.warn{background:linear-gradient(180deg,var(--gold-dim),transparent 70%),var(--surface);border-color:var(--gold)}
.kpi-label{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.kpi-warn-label{display:flex;align-items:center;gap:8px}
.kpi-warn-dot{width:6px;height:6px;border-radius:50%;background:var(--warn)}
.kpi-warn-label .kpi-label{color:var(--gold-dark)}
.kpi-hero-val{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:3.6rem;line-height:1;color:var(--text);margin-top:14px}
.kpi-hero-val span{font-size:1.9rem;color:var(--gold)}
.kpi-hero-line{width:40px;height:3px;background:var(--gold);margin-top:10px}
.kpi-hero-sub{font-size:.74rem;color:var(--muted2);margin-top:10px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:1.9rem;line-height:1;color:var(--text)}
.kpi-val span{font-size:1.2rem;color:var(--muted)}
.kpi-warn-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:1.9rem;line-height:1;color:var(--gold-dark)}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:6px}
.kpi-warn-sub{font-size:.68rem;color:var(--muted2);margin-top:6px}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:6px}
.sec-hdr-left{display:flex;align-items:baseline;gap:18px}
.sec-num{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:300;font-size:3.4rem;line-height:.9;color:var(--gold);opacity:.55}
.sec-title-wrap .eyebrow{margin-bottom:2px}
.sec-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.7rem;color:var(--text);line-height:1.15}
.sec-legend{display:flex;gap:18px;padding-bottom:6px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted)}
.legend-swatch{width:14px;height:8px;border-radius:2px}
.sec-divider{height:1px;background:var(--border-soft);margin-bottom:26px}

/* QUESTION ROWS */
.q-list{display:flex;flex-direction:column;margin-bottom:72px}
.q-row{display:grid;grid-template-columns:380px 1fr 130px;align-items:center;gap:32px;padding:18px 14px;border-radius:10px;border-bottom:1px solid var(--border-soft);transition:background .2s;cursor:default}
.q-row:hover{background:var(--surface)}
.q-text{font-size:.92rem;color:var(--text);line-height:1.4}
.q-bar{display:flex;gap:3px;height:12px}
.q-seg{border-radius:3px;transition:transform .2s}
.q-score{text-align:right}
.q-nota{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.4rem;color:var(--text)}
.q-resp{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);margin-top:2px}

/* COMMENTS */
.comment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:72px}
.comment-col-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.comment-cards{display:flex;flex-direction:column;gap:14px}
.comment-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:18px 20px 16px;transition:all .25s;cursor:default}
.comment-card:hover{border-color:var(--border);box-shadow:0 4px 18px var(--gold-dim);transform:translateY(-1px)}
.comment-quote-mark{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:400;font-size:1.9rem;line-height:1;color:var(--gold);opacity:.8;margin-bottom:2px}
.comment-text{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-weight:400;font-size:1.05rem;color:var(--text);line-height:1.45;margin-bottom:12px}
.comment-meta{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.comment-meta .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none}

/* FILTERS */
.filter-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.filter-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;box-shadow:0 4px 18px var(--gold-dim)}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group .fl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.filter-input{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text)}
.filter-input input,.filter-input select{background:none;border:none;outline:none;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;color:var(--text);cursor:pointer;min-width:60px}
.filter-input select option{background:var(--surface);color:var(--text)}
.filter-input svg{flex-shrink:0}
.filter-flex{flex:1;min-width:200px}
.btn-gold{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:9px;padding:11px 26px;cursor:pointer;transition:background .2s;box-shadow:0 4px 18px var(--gold-dim);align-self:flex-end}
.btn-gold:hover{background:var(--gold-dark)}
.filter-chips{display:flex;gap:8px;margin-bottom:44px;flex-wrap:wrap;min-height:24px}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:.72rem;color:var(--gold-dark);font-weight:500}
.chip-x{font-size:.68rem;cursor:pointer;opacity:.7;transition:opacity .2s}
.chip-x:hover{opacity:1}

/* TABLE */
.tbl-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.tbl-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.35rem;color:var(--text)}
.tbl-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 18px var(--gold-dim)}
.tbl-head{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl-head div{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border-soft);transition:background .2s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--gold-dim2)}
.tbl-date{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted2)}
.tbl-nome{font-size:.86rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-email{font-size:.8rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-tipo span{display:inline-block;font-size:.68rem;font-weight:500;color:var(--muted2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;background:var(--surface)}
.tbl-origem{font-size:.8rem;color:var(--muted2)}
.score-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;border-radius:999px;padding:3px 12px;min-width:34px;text-align:center;border:1px solid transparent}
.score-pill.alto{color:var(--success);background:var(--success-dim)}
.score-pill.medio{color:var(--gold-dark);background:var(--gold-dim)}
.score-pill.baixo{color:var(--danger);background:var(--danger-dim)}
.score-pill.nenhum{color:var(--muted);background:transparent;border-color:var(--border)}
.tbl-ver span{font-size:.78rem;font-weight:600;color:var(--gold-dark);cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.tbl-ver span:hover{border-bottom-color:var(--gold)}

/* PERIOD display */
.kpis-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.kpis-right{display:flex;align-items:center;gap:18px}
.kpis-ts{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted)}
.btn-nova{display:inline-flex;align-items:center;gap:8px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.8rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:9px;padding:10px 20px;cursor:pointer;transition:background .2s;box-shadow:0 4px 18px var(--gold-dim)}
.btn-nova:hover{background:var(--gold-dark)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 37%,var(--surface2) 63%);background-size:400% 100%;animation:sk 1.4s ease infinite;border-radius:6px;height:12px}
@keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* RESPONSIVE */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .main{padding:24px 16px 60px}
  .hdr{padding:0 16px}
  .tabs{padding:0 16px}
  .q-row{grid-template-columns:1fr 120px;grid-template-rows:auto auto}
  .q-bar{grid-column:1/-1;grid-row:2}
  .comment-grid{grid-template-columns:1fr}
  .tbl-head,.tbl-row{grid-template-columns:90px 1fr 90px 80px 60px}
  .tbl-email,.tbl-tipo{display:none}
}
</style>
</head>
<body data-theme="light">

<header class="hdr">
  <div style="display:flex;align-items:center">
    <div class="hdr-brand">
      <span>Gran Marquise</span>
      <em> · Pesquisa de Satisfação</em>
    </div>
    <nav class="hdr-nav">
      <a href="/admin.html">Painel</a>
      <a href="/gestao-qualidade" style="color:var(--gold-dark);font-weight:600">Qualidade</a>
    </nav>
  </div>
  <div class="hdr-right">
    <span class="hdr-ts" id="ts"></span>
    <button class="btn-theme" id="btnTheme" title="Alternar tema">☀</button>
    <button type="button" class="btn-sair" data-action="voltar-admin">← Voltar</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active">Avaliações</div>
</div>

<main class="main" id="main">
  <div class="empty">Carregando...</div>
</main>

<script>
(function(){
'use strict';

// --- Theme ---
const root = document.documentElement.parentElement || document.body.parentElement || document.documentElement;
const body = document.body;
const saved = localStorage.getItem('gq_theme') || 'light';
body.setAttribute('data-theme', saved);
const btnTheme = document.getElementById('btnTheme');
btnTheme.textContent = saved === 'dark' ? '☀' : '☾';
btnTheme.onclick = () => {
  const t = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', t);
  localStorage.setItem('gq_theme', t);
  btnTheme.textContent = t === 'dark' ? '☀' : '☾';
};

// --- Timestamp ---
function updateTs() {
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yy = now.getFullYear();
  const hh = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('ts').textContent = `${dd}/${mm}/${yy} · ${hh}:${mi}`;
}
updateTs();
setInterval(updateTs, 60000);

// --- State ---
const state = {
  from: '', to: '', tipo: '', origem: '', massagista: '', q: '',
  stats: null, rows: [], total: 0, page: 1, loading: false
};

// Default period: last 30 days
(function(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  state.to = fmt(now);
  state.from = fmt(new Date(now.getTime() - 30*24*3600*1000));
})();

// --- Utils ---
function fmtDate(iso){ return iso ? iso.slice(0,10).split('-').reverse().join('/') : ''; }
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function scoreClass(s){
  if(s==='—')return'nenhum';
  const n=parseInt(s);
  if(n>=85)return'alto';
  if(n>=60)return'medio';
  return'baixo';
}

function buildSegs(dist){
  const {otimo=0,bom=0,regular=0,ruim=0}=dist;
  const total=otimo+bom+regular+ruim||1;
  const segs=[];
  if(otimo>0)segs.push({w:otimo/total*100,bg:'var(--success)',tip:`Ótimo: ${otimo}`});
  if(bom>0)segs.push({w:bom/total*100,bg:'var(--gold)',tip:`Bom: ${bom}`});
  if(regular>0)segs.push({w:regular/total*100,bg:'var(--warn-dim)',border:'1px solid var(--gold)',tip:`Regular: ${regular}`});
  if(ruim>0)segs.push({w:ruim/total*100,bg:'var(--danger)',tip:`À Melhorar: ${ruim}`});
  if(!segs.length)segs.push({w:100,bg:'var(--border)',tip:'Sem dados'});
  return segs;
}

// --- Fetch ---
async function fetchStats(){
  const p=new URLSearchParams({
    slug:'spa-locc-v1',from:state.from,to:state.to,
    tipo:state.tipo,origem:state.origem,massagista:state.massagista
  });
  const r=await fetch('/api/gq/stats?'+p);
  if(!r.ok)throw new Error('Erro ao carregar estatísticas');
  return r.json();
}

async function fetchRespostas(page=1){
  const p=new URLSearchParams({
    slug:'spa-locc-v1',from:state.from,to:state.to,
    tipo:state.tipo,origem:state.origem,q:state.q,
    page,limit:20
  });
  const r=await fetch('/api/gq/respostas?'+p);
  if(!r.ok)throw new Error('Erro ao carregar respostas');
  return r.json();
}

// --- Render ---
function renderLegend(){
  return `<div class="sec-legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--success)"></span>Ótimo</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--gold)"></span>Bom</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--warn-dim);border:1px solid var(--gold)"></span>Regular</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--danger)"></span>À Melhorar</div>
  </div>`;
}

function renderSection(sec, idx){
  const num = String(idx+1).padStart(2,'0');
  const qs = sec.perguntas.map(q => {
    const segs = buildSegs(q.distribuicao);
    const barHtml = segs.map(s =>
      `<div class="q-seg" style="flex:${s.w} 1 0%;background:${s.bg};${s.border?'border:'+s.border:''}" title="${esc(s.tip)}"></div>`
    ).join('');
    return `<div class="q-row">
      <div class="q-text">${esc(q.texto)}</div>
      <div class="q-bar">${barHtml}</div>
      <div class="q-score">
        <div class="q-nota">${esc(q.nota)}</div>
        <div class="q-resp">${q.respostas} resp.</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="sec-hdr">
    <div class="sec-hdr-left">
      <div class="sec-num">${num}</div>
      <div class="sec-title-wrap">
        <div class="eyebrow">Seção</div>
        <div class="sec-title">${esc(sec.titulo)}</div>
      </div>
    </div>
    ${idx===0?renderLegend():''}
  </div>
  <div class="sec-divider"></div>
  <div class="q-list">${qs||'<div class="empty">Nenhuma pergunta com respostas</div>'}</div>`;
}

function renderComments(comentarios){
  if(!comentarios.length)return'';
  const numSec = (document.querySelectorAll('.sec-hdr').length || 2) + 1;
  const num = String(numSec).padStart(2,'0');
  const cols = comentarios.map(grp => {
    const cards = grp.itens.map(qt => `
      <div class="comment-card">
        <div class="comment-quote-mark">"</div>
        <div class="comment-text">${esc(qt.text)}</div>
        <div class="comment-meta">${esc(qt.author)} · <span class="mono">${esc(qt.date)}</span></div>
      </div>`).join('');
    return `<div>
      <div class="comment-col-label">${esc(grp.label)}</div>
      <div class="comment-cards">${cards}</div>
    </div>`;
  }).join('');
  return `<div class="sec-hdr">
    <div class="sec-hdr-left">
      <div class="sec-num">${num}</div>
      <div class="sec-title-wrap">
        <div class="eyebrow">Seção</div>
        <div class="sec-title">Comentários &amp; Respostas</div>
      </div>
    </div>
  </div>
  <div class="sec-divider"></div>
  <div class="comment-grid">${cols}</div>`;
}

function renderFilters(){
  const fromFmt = state.from ? state.from.split('-').reverse().join('/') : '';
  const toFmt = state.to ? state.to.split('-').reverse().join('/') : '';
  const chips = [];
  if(state.from && state.to) chips.push({label:`Período: ${fromFmt} → ${toFmt}`,key:'period'});
  if(state.tipo) chips.push({label:`Tipo: ${state.tipo}`,key:'tipo'});
  if(state.origem) chips.push({label:`Origem: ${state.origem}`,key:'origem'});
  if(state.massagista) chips.push({label:`Massoterapeuta: ${state.massagista}`,key:'massagista'});
  if(state.q) chips.push({label:`Busca: ${state.q}`,key:'q'});

  return `<div class="filter-label">Filtros</div>
  <div class="filter-box">
    <div class="filter-group">
      <span class="fl">Período</span>
      <div class="filter-input">
        <input type="date" id="fFrom" value="${state.from}">
        <span style="color:var(--gold)">→</span>
        <input type="date" id="fTo" value="${state.to}">
      </div>
    </div>
    <div class="filter-group">
      <span class="fl">Origem</span>
      <div class="filter-input">
        <select id="fOrigem">
          <option value="">Todas</option>
          <option value="hospede" ${state.origem==='hospede'?'selected':''}>Hóspede</option>
          <option value="colaborador" ${state.origem==='colaborador'?'selected':''}>Colaborador</option>
        </select>
      </div>
    </div>
    <div class="filter-group">
      <span class="fl">Tipo</span>
      <div class="filter-input">
        <select id="fTipo">
          <option value="">Todos</option>
          <option value="lazer" ${state.tipo==='lazer'?'selected':''}>Lazer</option>
          <option value="negocios" ${state.tipo==='negocios'?'selected':''}>Negócios</option>
          <option value="evento" ${state.tipo==='evento'?'selected':''}>Evento</option>
          <option value="passante" ${state.tipo==='passante'?'selected':''}>Passante</option>
          <option value="hospede" ${state.tipo==='hospede'?'selected':''}>Hóspede</option>
        </select>
      </div>
    </div>
    <div class="filter-group filter-flex">
      <span class="fl">Busca</span>
      <div class="filter-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input type="text" id="fQ" placeholder="Nome ou e-mail…" value="${esc(state.q)}" style="flex:1">
      </div>
    </div>
    <button class="btn-gold" id="btnFilter">Filtrar</button>
  </div>
  <div class="filter-chips" id="chips">
    ${chips.map(c=>`<div class="chip">${esc(c.label)}<span class="chip-x" data-key="${c.key}">✕</span></div>`).join('')}
  </div>`;
}

function renderTable(rows, total){
  const rowsHtml = rows.map(r => {
    const sc = scoreClass(r.media);
    const pct = r.media !== '—' ? r.media : null;
    return `<div class="tbl-row">
      <div class="tbl-date">${esc(r.date)}</div>
      <div class="tbl-nome">${esc(r.nome)}</div>
      <div class="tbl-email">${esc(r.email)}</div>
      <div class="tbl-tipo"><span>${esc(r.tipo)}</span></div>
      <div class="tbl-origem">${r.origem==='colaborador'?'Colaborador':'Hóspede'}</div>
      <div><span class="score-pill ${sc}">${esc(r.media)}</span></div>
      <div class="tbl-ver"><span data-action="ver-resposta" data-id="${r.id}">Ver</span></div>
    </div>`;
  }).join('');

  return `<div class="tbl-hdr">
    <div class="tbl-title">Avaliações</div>
    <div class="tbl-count">${total} resultado${total!==1?'s':''}</div>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-head">
      <div>Data</div><div>Nome</div><div>E-mail</div><div>Tipo</div><div>Origem</div><div>Média</div><div></div>
    </div>
    ${rowsHtml||'<div class="empty">Nenhuma avaliação encontrada</div>'}
  </div>`;
}

function renderKpis(stats){
  const media = stats.mediaGeral;
  const hospede = stats.origemDistrib?.hospede || 0;
  const colab = stats.origemDistrib?.colaborador || 0;
  const semAv = stats.semAvaliacao || 0;
  const rec = stats.pctRecomendacao;

  return `<div class="kpis-hdr">
    <div class="eyebrow">Visão geral do período</div>
    <div class="kpis-right">
      <div class="kpis-ts" id="ts2"></div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi hero">
      <div class="kpi-label">Média geral</div>
      <div>
        <div class="kpi-hero-val">${media!=null?Math.floor(media):'—'}<span>${media!=null?'%':''}</span></div>
        <div class="kpi-hero-line"></div>
        <div class="kpi-hero-sub">média de ${stats.total} avaliação${stats.total!==1?'s':''} do período</div>
      </div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total no período</div>
      <div class="kpi-val">${stats.total}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Recomendação</div>
      <div class="kpi-val">${rec!=null?rec.toFixed(1).replace('.',','):'—'}<span>${rec!=null?'%':''}</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Origem</div>
      <div>
        <div class="kpi-val">${hospede}<span>/${colab}</span></div>
        <div class="kpi-sub">hóspede / colaborador</div>
      </div>
    </div>
    <div class="kpi warn">
      <div class="kpi-warn-label">
        <span class="kpi-warn-dot"></span>
        <span class="kpi-label">Sem avaliação</span>
      </div>
      <div>
        <div class="kpi-warn-val">${semAv}</div>
        <div class="kpi-warn-sub">sessões sem resposta${semAv>stats.total?' — mais que as respondidas':''}</div>
      </div>
    </div>
  </div>`;
}

async function render(){
  if(state.loading)return;
  state.loading=true;
  const main=document.getElementById('main');
  main.innerHTML='<div class="empty">Carregando...</div>';
  try{
    const [statsRes, rowsRes]=await Promise.all([fetchStats(),fetchRespostas(1)]);
    if(!statsRes.ok)throw new Error(statsRes.error);
    state.stats=statsRes;
    state.rows=rowsRes.items||[];
    state.total=rowsRes.total||0;

    const secoesHtml=statsRes.secoes.map((s,i)=>renderSection(s,i)).join('');
    const commentsHtml=renderComments(statsRes.comentarios||[]);

    main.innerHTML=`
      ${renderKpis(statsRes)}
      ${secoesHtml}
      ${commentsHtml}
      ${renderFilters()}
      ${renderTable(state.rows, state.total)}
    `;
    // Update secondary timestamp
    const ts2=document.getElementById('ts2');
    if(ts2)ts2.textContent=document.getElementById('ts').textContent;
    wireEvents();
  }catch(e){
    const errDiv=document.createElement('div');
    errDiv.className='empty';
    errDiv.innerHTML=`Erro ao carregar dados: ${esc(e.message)}<br><br>`;
    const retryBtn=document.createElement('button');
    retryBtn.className='btn-gold';
    retryBtn.textContent='Tentar novamente';
    retryBtn.addEventListener('click',render);
    errDiv.appendChild(retryBtn);
    main.innerHTML='';
    main.appendChild(errDiv);
  }finally{
    state.loading=false;
  }
}

function applyFilter(){
  state.from=document.getElementById('fFrom')?.value||state.from;
  state.to=document.getElementById('fTo')?.value||state.to;
  state.tipo=document.getElementById('fTipo')?.value||'';
  state.origem=document.getElementById('fOrigem')?.value||'';
  state.q=document.getElementById('fQ')?.value||'';
  state.page=1;
  render();
}

function wireEvents(){
  document.getElementById('btnFilter')?.addEventListener('click',applyFilter);
  document.querySelectorAll('.chip-x').forEach(x=>{
    x.addEventListener('click',()=>{
      const k=x.dataset.key;
      if(k==='period'){state.from='';state.to='';}
      else if(k in state)state[k]='';
      render();
    });
  });
}

window.verResposta = function(id){ window.open('/admin.html#resposta-'+id,'_blank'); };

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'voltar-admin') location.href = '/admin.html';
  else if (action === 'ver-resposta') window.verResposta(Number(el.dataset.id));
});

render();
})();
</script>
</body>
</html>
