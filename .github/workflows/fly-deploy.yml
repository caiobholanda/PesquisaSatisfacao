name: Deploy to Fly.io
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Validate syntax (node --check)
        run: |
          node --check src/server.js
          node --check src/db.js
          node --check src/routes/feedback.js
          node --check src/routes/reservas.js
          node --check src/routes/cadastros.js
          node --check src/routes/auth.js
          node --check src/routes/dev.js
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --wait-timeout 180
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for health
        run: |
          echo "Aguardando app responder..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pesquisa-satisfacao.fly.dev/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "App no ar (tentativa $i)"
              exit 0
            fi
            echo "Tentativa $i — HTTP $STATUS, aguardando 5s..."
            sleep 5
          done
          echo "Timeout: app nao respondeu em 150s"
          exit 1
